name: Unity Build Regression Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-regression-check:
    runs-on: ubuntu-latest
    name: Check for Build Regressions

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Build your Unity project here and save logs
      # This example assumes logs are committed or generated by a prior step

      - name: Create test log files
        run: |
          mkdir -p logs
          printf "Build completed in 126.3 seconds\nCompiling scripts: 45.2s\nAsset import: 32.1s\nShader compilation: 28.7s\nAsset database refresh: 20.3s\n" > logs/baseline.log
          printf "Build completed in 287.6 seconds\nCompiling scripts: 98.4s\nAsset import: 31.9s\nShader compilation: 89.2s\nAsset database refresh: 68.1s\n" > logs/candidate.log

      - name: Run Build Regression Check
        id: regression
        uses: DillGreen/Build-Regression-tool@v1
        with:
          baseline_log: baseline_log.txt
          candidate_log: BaseLine_Log2.txt
          fail_percent: '40'
          fail_seconds: '30'
          output_format: markdown
          track_history: 'true'

      - name: Upload HTML Report
        if: hashFiles('build_regression_report.html') != ''
        uses: actions/upload-artifact@v7
        with:
          name: build-regression-report
          path: build_regression_report.html

      - name: Post regression summary to PR
        if: github.event_name == 'pull_request' && steps.regression.outputs.regression_detected == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ⚠️ Build Regression Detected\n\n**Severity:** ${{ steps.regression.outputs.severity }}\n**Cause:** ${{ steps.regression.outputs.reason_code }}\n**Change:** ${{ steps.regression.outputs.percent_change }}\n\nSee uploaded artifact for full HTML report.`
            })
